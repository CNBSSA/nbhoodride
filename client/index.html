  <head>
    <meta charset="UTF-8" />

    <title>PG Ride — People-Governed Mobility</title>
    <meta name="description" content="People-Governed, community-owned rideshare. Verified neighborhood drivers, transparent pricing, no surge fees. PG = People-Governed.">

    <meta property="og:title" content="PG Ride — People-Governed Mobility" />
    <meta property="og:description" content="Community-owned rideshare. Your ride from neighbors, by neighbors. No surge pricing." />

    <meta property="og:image" content="https://peoplegoverned.com/icons/icon-512.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:image" content="https://peoplegoverned.com/icons/icon-512.png" />
    
    <!-- Font imports -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <body>
    <div id="root"></div>
    <noscript>
      <!-- Crawler / no-JavaScript fallback. The app is a client-rendered SPA;
           this block ensures automated reviewers and search engines can still
           read a description of the business without executing JavaScript. -->
      <main style="max-width:640px;margin:40px auto;padding:0 20px;font-family:system-ui,sans-serif;line-height:1.6;">
        <h1>PG Ride — community-owned rideshare</h1>
        <p>
          PG Ride is a community rideshare marketplace. Riders book on-demand or
          scheduled local trips and are matched with background-checked
          neighborhood drivers. Pickups originate in Maryland; drop-offs are
          available in Maryland, Washington DC, and northern Virginia. Fares are
          transparent with no surge pricing, and card payments are processed
          through Stripe.
        </p>
        <p>
          This app requires JavaScript. For a full description of our business,
          visit <a href="/about">/about</a>. See our
          <a href="/terms">Terms of Service</a> and
          <a href="/privacy">Privacy Policy</a>.
        </p>
        <p><a href="/about">Learn more about PG Ride &rarr;</a></p>
      </main>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
