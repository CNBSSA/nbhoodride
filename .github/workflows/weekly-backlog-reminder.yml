name: Weekly Founder Backlog Reminder

# Nags the founder about the launch backlog once a week, indefinitely.
# Source of truth: docs/FOUNDER_BACKLOG.md
# GitHub only runs scheduled workflows from the default branch (main).
on:
  schedule:
    - cron: "13 14 * * 1"   # Mondays 14:13 UTC (off-minute on purpose)
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const label = "founder-backlog";
            const title = "📋 Founder backlog — revisit weekly (do not let these slide)";
            const body = [
              "Weekly reminder — these launch items are still open. Pick one and move it forward:",
              "",
              "- [ ] 🚗 **Rider sees the car** — make · model · color · **license plate** on the rider's active-ride screen (safety-critical; data already exists).",
              "- [ ] 💳 **Stripe account review** — break the 14-day reject loop; reframe as \"software for independent drivers\", point the site at https://www.peoplegoverned.com/about, escalate to Stripe support.",
              "- [ ] 🎟️ **Promo code** — \"first ride 20% off\" wired into the app + a matching card.",
              "- [ ] 🚙 **Driver economics / recruitment** — decide the driver split, then a \"keep more · own a piece\" recruiting flyer.",
              "",
              "Full context: `docs/FOUNDER_BACKLOG.md`.",
            ].join("\n");

            // Ensure the label exists (best-effort).
            try {
              await github.rest.issues.getLabel({ owner, repo, name: label });
            } catch {
              try { await github.rest.issues.createLabel({ owner, repo, name: label, color: "1565C0", description: "Recurring founder launch backlog" }); } catch {}
            }

            // One persistent issue; comment on it each week (create it if missing).
            const existing = await github.rest.issues.listForRepo({ owner, repo, state: "open", labels: label, per_page: 1 });
            if (existing.data.length === 0) {
              const created = await github.rest.issues.create({ owner, repo, title, body, labels: [label], assignees: [owner] });
              console.log("Created backlog reminder issue #" + created.data.number);
            } else {
              const num = existing.data[0].number;
              await github.rest.issues.createComment({ owner, repo, issue_number: num, body: "⏰ **Weekly nudge**\n\n" + body });
              console.log("Commented weekly nudge on issue #" + num);
            }
